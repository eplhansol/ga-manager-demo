<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>총무 관리 시스템 (GA-Manager) · 포트폴리오 데모</title>
<meta name="description" content="㈜HHS 사내 총무 관리 시스템 — 계약·IT자산·보험·차량·렌탈·지식재산권 통합 관리 데모" />
<style>
:root{
  --bg:#f4f6f9; --panel:#ffffff; --border:#e2e6ec; --text:#1f2733; --muted:#8a93a2;
  --primary:#2f6df0; --primary-dark:#1f55c8; --danger:#e0483d; --urgent:#e0483d;
  --soon:#e8920c; --ok:#2a9d54;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--primary);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
h2{font-size:20px;margin:0 0 16px}
h3{font-size:15px;margin:0 0 12px}
.muted{color:var(--muted)}
.small{font-size:12px}
.center{text-align:center;padding:40px}
.error{background:#fdeceb;color:var(--danger);padding:10px 14px;border-radius:8px;margin:10px 0}
.ellip{max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nowrap{white-space:nowrap}

/* 데모 배너 */
.demo-banner{background:linear-gradient(90deg,#2f6df0,#7c3aed);color:#fff;font-size:12.5px;
  padding:7px 18px;display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap}
.demo-banner b{font-weight:700}
.demo-banner .role-switch{display:flex;gap:6px;margin-left:8px}
.demo-banner .role-switch button{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  color:#fff;font-size:11px;padding:3px 9px;border-radius:20px}
.demo-banner .role-switch button.on{background:#fff;color:var(--primary);font-weight:700}

/* 레이아웃 */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:#16202e;color:#cdd5e0;padding:18px 12px;flex-shrink:0}
.brand{font-size:18px;font-weight:700;color:#fff;padding:8px 10px 18px}
.brand span{display:block;font-size:11px;color:#6b7888;font-weight:400}
.navgroup{font-size:11px;color:#6b7888;margin:16px 10px 6px;text-transform:uppercase}
.navitem{display:block;color:#cdd5e0;padding:8px 10px;border-radius:7px;margin-bottom:2px;cursor:pointer}
.navitem:hover{background:#222e3f;text-decoration:none}
.navitem.active{background:var(--primary);color:#fff}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--panel);
  border-bottom:1px solid var(--border);padding:10px 20px;gap:16px}
.searchbox{display:flex;gap:6px;flex:1;max-width:460px}
.searchbox input{flex:1}
.userbox{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
.content{padding:22px;overflow:auto}

input,select,textarea{font:inherit;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text);width:100%}
input:disabled,textarea:disabled{background:#f5f7fa;color:#555}
textarea{min-height:70px;resize:vertical}
button{font:inherit;cursor:pointer}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:7px;white-space:nowrap}
.btn:hover{background:var(--primary-dark)}
.ghost{background:#fff;border:1px solid var(--border);padding:8px 14px;border-radius:7px;color:var(--text);white-space:nowrap}
.ghost:hover{background:#f0f3f8}
.ghost.danger,.linkbtn.danger{color:var(--danger)}
.linkbtn{background:none;border:none;color:var(--primary);padding:0}
button:disabled{opacity:.5;cursor:default}

.tbl{width:100%;border-collapse:collapse;background:var(--panel);border-radius:8px;overflow:hidden}
.tbl th,.tbl td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl th{background:#f7f9fc;color:var(--muted);font-weight:600;font-size:12px}
.tbl th.num,.tbl td.num{text-align:right}
.tbl td.num{font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl tbody tr:hover{background:#f7faff}
.rowlink{cursor:pointer}
.pager{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.actions select{width:auto}
.search-inline{width:200px}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-box.clickable{cursor:pointer;color:var(--text)}
.stat-box.clickable:hover{border-color:var(--primary);text-decoration:none}
.stat-title{color:var(--muted);font-size:13px}
.stat-big{font-size:26px;font-weight:700;margin:6px 0}
.stat-big.warn{color:var(--soon)}
.stat-big.danger{color:var(--danger)}
.stat-sub{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-size:12px}

.barchart{display:flex;align-items:flex-end;gap:6px;height:190px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.bar{width:70%;margin:0 auto;background:var(--primary);border-radius:4px 4px 0 0;min-height:3px;transition:height .2s}
.bar-col:hover .bar{background:var(--primary-dark)}
.bar-label{font-size:12px;color:var(--text);margin-top:5px}
.bar-val{font-size:10px;color:var(--muted);height:14px;white-space:nowrap}

th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--primary)}
.badge-archived{background:#4b5563;color:#fff;font-size:11px;padding:2px 8px;border-radius:5px}

.detailrow>td{background:#f7faff;padding:14px 18px}
.inline-detail .form-grid{grid-template-columns:repeat(3,1fr);gap:10px 18px;margin-bottom:12px}
.kv{display:flex;flex-direction:column;gap:2px}
.kv .k{font-size:11px;color:var(--muted)}
.kv .v{font-size:13px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;display:block;color:var(--text);cursor:pointer}
.card:hover{border-color:var(--primary);text-decoration:none}
.card-label{color:var(--muted);font-size:13px}
.card-count{font-size:24px;font-weight:700;margin-top:4px}
.card-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.card-warn{color:var(--soon);font-size:11px;background:#fdf2e2;padding:1px 6px;border-radius:4px}
.card-danger{color:var(--danger);font-size:11px;background:#fdeceb;padding:1px 6px;border-radius:4px}
.dash-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px}
.changes{list-style:none;padding:0;margin:0}
.changes li{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.tag{font-size:11px;padding:2px 7px;border-radius:5px;color:#fff}
.tag-create{background:var(--ok)}
.tag-update{background:var(--soon)}
.tag-delete{background:var(--danger)}

.dday{font-weight:600;padding:2px 8px;border-radius:5px;background:#eef1f6;color:var(--muted);font-size:12px}
.dday.soon{background:#fdf2e2;color:var(--soon)}
.dday.urgent{background:#fdeceb;color:var(--urgent)}
.dday.expired{background:#4b5563;color:#fff}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-grid label{display:flex;flex-direction:column;gap:5px;font-size:13px}
.form-grid label>span{color:var(--muted)}
.form-grid .full{grid-column:1 / -1}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:#fff;padding:36px;border-radius:14px;width:360px;box-shadow:0 8px 30px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:14px}
.login-card h1{font-size:21px;margin:0}
.login-card .sub{color:var(--muted);font-size:13px;margin-top:-8px}
.login-card label{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--muted)}
.login-card .btn{margin-top:4px;padding:11px}
.login-roles{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.login-roles button{text-align:left;padding:11px 14px;border:1px solid var(--border);border-radius:9px;background:#fff;display:flex;flex-direction:column;gap:2px}
.login-roles button:hover{border-color:var(--primary);background:#f7faff}
.login-roles .r-name{font-weight:700;color:var(--text);font-size:14px}
.login-roles .r-desc{color:var(--muted);font-size:12px}

@media (max-width:900px){.dash-cols{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>

const fieldType = (d,k) => { const f=(DOMAINS[d]||{fields:[]}).fields.find(x=>x.key===k); return f?f.type:'text'; };
const fieldLabel = (d,k) => { const f=(DOMAINS[d]||{fields:[]}).fields.find(x=>x.key===k); return f?f.label:k; };

/* ---------- 날짜/숫자 헬퍼 ---------- */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function addDays(n){ const d=new Date(TODAY); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function dateOffset(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtDate(v){ if(v==null||v==='')return''; const m=String(v).match(/^(\d{4}-\d{2}-\d{2})/); return m?m[1]:String(v); }
function won(n){ if(n==null)return'-'; return Number(n).toLocaleString('ko-KR')+'원'; }
function ddayFrom(dateStr){ if(!dateStr)return null; const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-TODAY)/86400000); }
function formatVal(v,type){ if(v==null||v==='')return'';
  if(type==='date')return fmtDate(v);
  if(type==='money'&&!isNaN(Number(v)))return Number(v).toLocaleString('ko-KR')+'원';
  if(typeof v==='number')return v.toLocaleString('ko-KR');
  if(type==='number'&&!isNaN(Number(v)))return Number(v).toLocaleString('ko-KR');
  return String(v); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function ddayBadge(dday){ if(dday==null)return '<span class="muted">-</span>';
  let cls='dday'; if(dday<0)cls+=' expired'; else if(dday<=7)cls+=' urgent'; else if(dday<=30)cls+=' soon';
  const label=dday<0?`D+${Math.abs(dday)}`:`D-${dday}`; return `<span class="${cls}">${label}</span>`; }

const pick=(a,i)=>a[i%a.length];

/* ---------- 라우팅 ---------- */
function parseHash(){
  const h=location.hash.replace(/^#/,'')||'/';
  const [path,qs]=h.split('?');
  const params={}; (qs||'').split('&').forEach(p=>{ if(!p)return; const [k,v]=p.split('='); params[k]=decodeURIComponent(v||''); });
  return { path, params };
}
function go(path){ location.hash=path; }

/* ---------- 렌더 ---------- */
const app=()=>document.getElementById('app');

function render(){
  if(!CURRENT){ renderLogin(); return; }
  const {path,params}=parseHash();
  let inner='';
  if(path==='/'||path===''){ inner=viewDashboard(); }
  else if(path==='/worklog'){ inner=viewWorklog(params); }
  else if(path==='/expired'){ inner=viewExpired(); }
  else if(path==='/search'){ inner=viewSearch(params); }
  else if(path.startsWith('/d/')){ const dk=path.slice(3); inner = canSee(dk)? viewDomain(dk,params) : `<div class="error">접근 권한이 없습니다.</div>`; }
  else if(path==='/admin/users'){ inner = isAdmin()? viewUsers() : `<div class="error">관리자 전용입니다.</div>`; }
  else if(path==='/admin/notifications'){ inner = isAdmin()? viewNotifications() : `<div class="error">관리자 전용입니다.</div>`; }
  else inner=`<div class="error">페이지를 찾을 수 없습니다.</div>`;
  app().innerHTML = shell(inner, path);
  bindShell();
}

function bindShell(){
  document.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>go(el.getAttribute('data-go')));
  document.querySelectorAll('.role-switch button').forEach(b=>b.onclick=()=>{ CURRENT=Object.assign({},USERS[b.getAttribute('data-role')]); if(location.hash.startsWith('#/d/')&&!canSee(location.hash.slice(4))){go('/');} else render(); });
  const f=document.getElementById('searchForm');
  if(f) f.onsubmit=(e)=>{ e.preventDefault(); const q=document.getElementById('searchInput').value.trim(); if(q) go('/search?q='+encodeURIComponent(q)); };

}

/* ---------- 대시보드 ---------- */
function domainSummary(){
  return DOMAIN_LIST.filter(d=>canSee(d.key)).map(meta=>{
    const rows=DATA[meta.key]||[];
    let expiringSoon=0, expired=0;
    if(meta.showExpire) rows.forEach(r=>{ const dd=r.common&&r.common.dday; if(dd==null)return; if(dd<0)expired++; else if(dd<=60)expiringSoon++; });
    const active = meta.showExpire ? rows.filter(r=>!(r.common&&r.common.dday<0)).length : rows.length;
    return { domain:meta.key, label:meta.label, count:active, expiringSoon, expired };
  });
}
function expiringList(){
  const out=[];
  DOMAIN_LIST.filter(d=>canSee(d.key)&&d.showExpire).forEach(meta=>{
    (DATA[meta.key]||[]).forEach(r=>{
      const dd=r.common&&r.common.dday;
      if(dd!=null&&dd>=0&&dd<=60) out.push({domain:meta.key,refId:r.id,title:titleOf(meta.key,r),manager:r.manager||r.insurer||'-',expireDate:r.common.expireDate,dday:dd});
    });
  });
  return out.sort((a,b)=>a.dday-b.dday);
}
function titleOf(dk,r){
  return r.content||r.ins_name||r.name_ko||r.tm_right||r.item||r.model_name||r.device_name||r.doc_no||'-';
}
function monthlyCost(){
  const months=Array.from({length:12},(_,i)=>({month:i+1,total:0,cnt:0}));
  WORKLOG.forEach(w=>{ const m=Number(w.logDate.slice(5,7)); if(w.cost){ months[m-1].total+=w.cost; months[m-1].cnt++; } });
  return {year:Y,months};
}
function fixedCost(){
  let sw=0,rental=0,ins=0;
  (DATA.sw||[]).forEach(r=>sw+=r.cost_monthly||0);
  (DATA.rental||[]).forEach(r=>{ if(!(r.common&&r.common.dday<0)) rental+=r.monthly_payment||0; });
  (DATA.insurance||[]).forEach(r=>{ if(!(r.common&&r.common.dday<0)) ins+=Math.round((r.premium||0)/12); });
  return { monthlyTotal:sw+rental+ins, items:[{key:'sw',label:'SW',monthly:sw},{key:'rental',label:'렌탈',monthly:rental},{key:'insurance',label:'보험',monthly:ins}] };
}

/* ---------- 인라인 상세 ---------- */
function inlineDetail(dk,id){
  const meta=DOMAINS[dk]; const r=(DATA[dk]||[]).find(x=>x.id==id); if(!r)return'<span class="muted">없음</span>';
  const kv=meta.fields.map(f=>{
    let v=r[f.key];
    if(f.key==='credential'&&!isAdmin()) v='••••••••';
    const sv=formatVal(v,f.type); if(!sv)return'';
    return `<div class="kv"><span class="k">${f.label}</span><span class="v">${esc(sv)}</span></div>`;
  }).join('');
  return `<div class="inline-detail"><div class="form-grid">${kv}</div></div>`;
}

/* ---------- 영역 목록 ---------- */
const LISTSTATE={};
function viewDomain(dk,params){
  const meta=DOMAINS[dk]; if(!meta)return'<div class="error">알 수 없는 영역</div>';
  const st=LISTSTATE[dk]||(LISTSTATE[dk]={sortCol:meta.showExpire?'expire_date':'id',sortDir:'desc',q:'',open:null});
  let rows=[...(DATA[dk]||[])];
  if(st.q){ const q=st.q.toLowerCase(); rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(q)); }
  rows.sort((a,b)=>{
    let av,bv;
    if(st.sortCol==='expire_date'){ av=a.common?a.common.expireDate:''; bv=b.common?b.common.expireDate:''; }
    else { av=a[st.sortCol]; bv=b[st.sortCol]; }
    if(av==null)av=''; if(bv==null)bv='';
    if(typeof av==='number'&&typeof bv==='number') return st.sortDir==='asc'?av-bv:bv-av;
    return st.sortDir==='asc'? String(av).localeCompare(String(bv),'ko') : String(bv).localeCompare(String(av),'ko');
  });
  const sortIcon=c=>st.sortCol===c?(st.sortDir==='asc'?' ▲':' ▼'):'';
  const colCount=meta.listColumns.length+(meta.showExpire?2:0)+1;
  const head=`<tr><th style="width:24px"></th>
    ${meta.listColumns.map(c=>{const t=fieldType(dk,c);const num=(t==='number'||t==='money')?' num':'';return `<th class="sortable${num}" data-sort="${c}">${fieldLabel(dk,c)}${sortIcon(c)}</th>`;}).join('')}
    ${meta.showExpire?`<th class="sortable" data-sort="expire_date">만료일${sortIcon('expire_date')}</th><th>D-DAY</th>`:''}</tr>`;
  const body=rows.length===0?`<tr><td colspan="${colCount}" class="muted center">데이터가 없습니다.</td></tr>`:
    rows.map(r=>{
      const cells=meta.listColumns.map(c=>{const t=fieldType(dk,c);const num=(t==='number'||t==='money');return `<td class="${num?'num':'ellip'}">${esc(formatVal(r[c],t))}</td>`;}).join('');
      const expCells=meta.showExpire?`<td>${formatVal(r.common&&r.common.expireDate,'date')}</td><td>${ddayBadge(r.common&&r.common.dday)}</td>`:'';
      const open=st.open==r.id;
      return `<tr class="rowlink" data-row="${r.id}"><td class="muted">${open?'▾':'▸'}</td>${cells}${expCells}</tr>
        ${open?`<tr class="detailrow"><td colspan="${colCount}">${inlineDetail(dk,r.id)}</td></tr>`:''}`;
    }).join('');

  return `<div><div class="page-head"><h2>${meta.label}</h2>
    <div class="actions">
      <input class="search-inline" id="dq" placeholder="이 영역에서 검색" value="${esc(st.q)}" />
      <button class="ghost" id="dexport">엑셀 내보내기</button>
      ${isAdmin()?`<button class="btn" id="dnew">+ 신규 등록</button>`:''}
    </div></div>
    <div class="muted small">총 ${rows.length.toLocaleString('ko-KR')}건 · 행을 클릭하면 상세가 펼쳐집니다</div>
    <table class="tbl"><thead>${head}</thead><tbody>${body}</tbody></table>
    <div class="pager"><span class="muted small">${rows.length}건 전체 표시</span></div>
    </div>`;
}

/* ---------- 만료 관리 ---------- */
function viewExpired(){
  const tabs=DOMAIN_LIST.filter(d=>canSee(d.key)&&d.showExpire);
  let html=`<h2>⏰ 만료 관리</h2><p class="muted small">만료일이 지난 항목입니다. 갱신 후 정리하거나 보관 처리합니다.</p>`;
  let any=false;
  tabs.forEach(meta=>{
    const rows=(DATA[meta.key]||[]).filter(r=>r.common&&r.common.dday<0).sort((a,b)=>b.common.expireDate.localeCompare(a.common.expireDate));
    if(rows.length===0)return; any=true;
    html+=`<section class="panel"><h3>${meta.label} <span class="tab-count">${rows.length}</span></h3>
      <table class="tbl"><thead><tr><th>항목</th><th class="nowrap">담당자</th><th class="nowrap">만료일</th><th class="nowrap">경과</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td class="ellip">${esc(titleOf(meta.key,r))}</td>
        <td class="nowrap">${esc(r.manager||r.insurer||'-')}</td><td class="nowrap">${fmtDate(r.common.expireDate)}</td>
        <td class="nowrap">${ddayBadge(r.common.dday)}</td></tr>`).join('')}</tbody></table></section>`;
  });
  if(!any) html+=`<div class="panel muted center">만료된 항목이 없습니다. 👍</div>`;
  return html;
}

/* ---------- 업무 보고 ---------- */
function viewWorklog(params){
  const year=Y, month=params.m?Number(params.m):'';
  let items=WORKLOG.filter(w=>w.logDate.slice(0,4)==String(year));
  if(month) items=items.filter(w=>Number(w.logDate.slice(5,7))===month);
  items=items.sort((a,b)=>b.logDate.localeCompare(a.logDate));
  const total=items.reduce((a,i)=>a+(i.cost||0),0);
  const admin=isAdmin();
  const monthOpts=['<option value="">전체 월</option>'].concat(Array.from({length:12},(_,i)=>`<option value="${i+1}" ${month===i+1?'selected':''}>${i+1}월</option>`)).join('');
  const body=items.length===0?`<tr><td colspan="${admin?8:7}" class="muted center">기록이 없습니다.</td></tr>`:
    items.map(it=>`<tr><td class="nowrap">${fmtDate(it.logDate)}</td><td class="nowrap">${esc(it.category||'-')}</td>
      <td class="nowrap">${esc(it.area||'-')}</td><td class="ellip">${esc(it.content)}</td>
      <td class="num">${it.cost!=null?it.cost.toLocaleString('ko-KR')+'원':'-'}</td>
      <td class="ellip small">${esc(it.docNo||'-')}</td><td class="ellip small">${esc(it.note||'-')}</td>
      ${admin?`<td><button class="linkbtn danger" data-wldel="${it.id}">삭제</button></td>`:''}</tr>`).join('');
  return `<div><div class="page-head"><h2>월별 업무사항 보고</h2>
    <div class="actions">
      <select disabled><option>${year}년</option></select>
      <select id="wlmonth">${monthOpts}</select>
      ${admin?`<button class="btn" id="wladd">+ 업무 추가</button>`:''}
    </div></div>
    <div id="wlform"></div>
    <div class="muted small">${items.length}건 · 비용 합계 ${won(total)}</div>
    <table class="tbl"><thead><tr><th class="nowrap">일자</th><th class="nowrap">항목</th><th class="nowrap">영역</th><th>세부내용</th><th class="num">비용</th><th>품의</th><th>비고</th>${admin?'<th></th>':''}</tr></thead>
    <tbody>${body}</tbody></table></div>`;
}

/* ---------- 검색 ---------- */
function viewSearch(params){
  const q=(params.q||'').toLowerCase(); if(!q)return'<div class="muted">검색어를 입력하세요.</div>';
  let out=[];
  DOMAIN_LIST.filter(d=>canSee(d.key)).forEach(meta=>{
    (DATA[meta.key]||[]).forEach(r=>{ if(JSON.stringify(r).toLowerCase().includes(q)) out.push({domain:meta.key,title:titleOf(meta.key,r),expire:r.common?r.common.expireDate:'',dday:r.common?r.common.dday:null}); });
  });
  const body=out.length===0?`<tr><td colspan="4" class="muted center">"${esc(params.q)}" 검색 결과가 없습니다.</td></tr>`:
    out.map(o=>`<tr><td class="nowrap">${labelOf(o.domain)}</td><td class="ellip">${esc(o.title)}</td>
      <td class="nowrap">${o.expire?fmtDate(o.expire):'-'}</td><td>${o.dday!=null?ddayBadge(o.dday):'-'}</td></tr>`).join('');
  return `<h2>검색 결과 <span class="muted small">"${esc(params.q)}" · ${out.length}건</span></h2>
    <table class="tbl"><thead><tr><th>영역</th><th>항목</th><th>만료일</th><th>D-DAY</th></tr></thead><tbody>${body}</tbody></table>`;
}

/* ---------- 관리자 화면 ---------- */
function viewUsers(){
  const rows=Object.values(USERS).map((u,i)=>`<tr><td>${i+1}</td><td>${u.name==='관리자'?'admin@hhs.kr':u.name.toLowerCase()+'@hhs.kr'}</td>
    <td>${esc(u.name)}</td><td>${roleLabelOf(u.role)}</td><td>${u.allowed==='*'?'전체':u.allowed.map(labelOf).join(', ')}</td></tr>`).join('');
  return `<div class="page-head"><h2>👥 사용자</h2><div class="actions"><button class="btn" onclick="alert('데모에서는 사용자 추가가 비활성화되어 있습니다.')">+ 사용자 추가</button></div></div>
    <p class="muted small">3단계 권한: 관리자(전체 편집) · 뷰어(전체 조회) · 제한된 유저(허용 영역만)</p>
    <table class="tbl"><thead><tr><th>#</th><th>이메일</th><th>이름</th><th>권한</th><th>허용 영역</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function viewNotifications(){
  return `<h2>🔔 알림 설정</h2>
    <section class="panel form-grid">
      <label><span>총무팀 대표 메일</span><input value="admin@hhs.kr" disabled></label>
      <label><span>매일 발송 시각</span><input value="09:00" disabled></label>
      <label><span>SMTP 호스트</span><input value="smtp.hhs.kr" disabled></label>
      <label><span>SMTP 포트</span><input value="587" disabled></label>
      <label><span>만료 임계일 (1차/2차/긴급)</span><input value="30 / 7 / 1" disabled></label>
      <label><span>발송 계정</span><input value="noreply@hhs.kr" disabled></label>
      <div class="full"><button class="btn" onclick="alert('데모: 테스트 메일 발송 (실제 발송되지 않음)')">테스트 메일 발송</button></div>
    </section>
    <p class="muted small">데모 화면입니다. 실제 배포본에서는 매일 지정 시각에 만료 임박 항목을 메일로 발송합니다.</p>`;
}

/* ---------- 이벤트 위임 ---------- */
document.addEventListener('click',e=>{
  const row=e.target.closest('[data-row]');
  if(row){ const {path}=parseHash(); const dk=path.slice(3); const st=LISTSTATE[dk]; const id=Number(row.getAttribute('data-row')); if(st){ st.open=st.open==id?null:id; render(); } return; }
  const det=e.target.closest('[data-detail]');
  if(det){ const [dk,id]=det.getAttribute('data-detail').split(':'); const tr=det.nextElementSibling;
    if(tr&&tr.classList.contains('detailrow')){ tr.remove(); det.querySelector('td').textContent='▸'; }
    else { const nr=document.createElement('tr'); nr.className='detailrow'; const cc=det.children.length;
      nr.innerHTML=`<td colspan="${cc}">${inlineDetail(dk,id)}</td>`; det.after(nr); det.querySelector('td').textContent='▾'; }
    return; }
  const sortTh=e.target.closest('th[data-sort]');
  if(sortTh){ const {path}=parseHash(); const dk=path.slice(3); const st=LISTSTATE[dk]; const c=sortTh.getAttribute('data-sort');
    if(st.sortCol===c)st.sortDir=st.sortDir==='asc'?'desc':'asc'; else {st.sortCol=c;st.sortDir='asc';} render(); return; }
  if(e.target.id==='dexport'){ alert('데모: 엑셀 내보내기 (실제 배포본에서는 .xlsx 파일이 생성됩니다)'); return; }
  if(e.target.id==='dnew'){ alert('데모: 신규 등록 폼 (실제 배포본에서는 입력 후 저장됩니다)'); return; }
  if(e.target.id==='wladd'){ openWorklogForm(); return; }
  const wldel=e.target.closest('[data-wldel]');
  if(wldel){ if(confirm('삭제할까요?')){ const id=Number(wldel.getAttribute('data-wldel')); WORKLOG=WORKLOG.filter(w=>w.id!==id); render(); } return; }
});
document.addEventListener('input',e=>{
  if(e.target.id==='dq'){ const {path}=parseHash(); const dk=path.slice(3); const st=LISTSTATE[dk]; st.q=e.target.value;
    const pos=e.target.selectionStart; render(); const ni=document.getElementById('dq'); if(ni){ni.focus(); ni.setSelectionRange(pos,pos);} }
});
document.addEventListener('change',e=>{
  if(e.target.id==='wlmonth'){ const v=e.target.value; go(v?'/worklog?m='+v:'/worklog'); }
});

function openWorklogForm(){
  const c=document.getElementById('wlform'); if(!c)return;
  if(c.innerHTML){ c.innerHTML=''; return; }
  c.innerHTML=`<form class="panel form-grid" id="wlf">
    <label><span>일자</span><input type="date" id="f_date" value="${addDays(0)}" required></label>
    <label><span>항목</span><select id="f_cat">${['총무','인사','회계','법무'].map(x=>`<option>${x}</option>`).join('')}</select></label>
    <label><span>영역</span><input id="f_area" placeholder="SW / HW / 보험 / 사옥유지보수 …"></label>
    <label class="full"><span>세부내용</span><input id="f_content" required></label>
    <label><span>비용(VAT포함)</span><input type="number" id="f_cost"></label>
    <label><span>품의</span><input id="f_doc"></label>
    <label class="full"><span>비고</span><input id="f_note"></label>
    <div class="full"><button class="btn" type="submit">저장</button></div></form>`;
  document.getElementById('wlf').onsubmit=ev=>{ ev.preventDefault();
    WORKLOG.push({ id:++wlId, logDate:document.getElementById('f_date').value, category:document.getElementById('f_cat').value,
      area:document.getElementById('f_area').value, content:document.getElementById('f_content').value,
      cost:Number(document.getElementById('f_cost').value)||0, docNo:document.getElementById('f_doc').value, note:document.getElementById('f_note').value });
    render(); };
}

/* ---------- 시작 ---------- */
window.addEventListener('hashchange',render);
render();
</script>
